<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="htmx-config" content='{"historyCacheSize": 10, "historyRestoreAsHxRequest": false, "scrollBehavior": "instant"}'>
    <title>{% block title %}x4explorer{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body hx-boost="true">
    <header class="container">
        <nav>
            <ul>
                <li><a href="/"><strong>x4explorer</strong></a></li>
            </ul>
            <ul>
                <li><a href="/search" {% if current == 'search' %}aria-current="page"{% endif %}>Search</a></li>
                <li><a href="/wares" {% if current == 'wares' %}aria-current="page"{% endif %}>Wares</a></li>
                <li><a href="/macros" {% if current == 'macros' %}aria-current="page"{% endif %}>Macros</a></li>
                <li><a href="/components" {% if current == 'components' %}aria-current="page"{% endif %}>Components</a></li>
                <li><a href="/scripts/datatypes" {% if current == 'datatypes' %}aria-current="page"{% endif %}>Datatypes</a></li>
                <li><a href="/scripts/keywords" {% if current == 'keywords' %}aria-current="page"{% endif %}>Keywords</a></li>
                <li><a href="/conflicts" {% if current == 'conflicts' %}aria-current="page"{% endif %}>Conflicts</a></li>
            </ul>
        </nav>
    </header>

    <div id="error-display" class="container" role="alert"></div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>
            x4explorer &mdash; powered by
            <a href="https://github.com/meethune/x4cat" hx-boost="false">x4cat</a>
        </small>
    </footer>

    <script src="/static/js/htmx.min.js"></script>
    <script>
    // Stateful nav links: persist last query string per list page
    // in sessionStorage so nav links restore filter state even
    // after navigating to detail pages and back.
    (function() {
        var PATHS = ["/wares", "/macros", "/components", "/search",
                     "/scripts/datatypes", "/scripts/keywords"];
        var KEY = "x4e_nav_";

        function saveState(url) {
            var parsed = new URL(url, location.origin);
            var path = parsed.pathname.replace(/\/$/, "") || "/";
            if (PATHS.indexOf(path) === -1) return;
            if (parsed.search) {
                sessionStorage.setItem(KEY + path, parsed.search);
            }
        }

        function applyNavLinks() {
            for (var i = 0; i < PATHS.length; i++) {
                var path = PATHS[i];
                var qs = sessionStorage.getItem(KEY + path);
                if (!qs) continue;
                var links = document.querySelectorAll('nav a[href^="' + path + '"]');
                for (var j = 0; j < links.length; j++) {
                    var linkPath = new URL(links[j].href, location.origin).pathname;
                    if (linkPath === path) {
                        links[j].href = path + qs;
                    }
                }
            }
        }

        // Save current URL state and apply stored state to nav links
        saveState(location.href);
        applyNavLinks();

        // Save state on every URL push from htmx interactions
        document.body.addEventListener("htmx:pushedIntoHistory", function(e) {
            saveState(e.detail.path);
            applyNavLinks();
        });
        document.body.addEventListener("htmx:replacedInHistory", function(e) {
            saveState(e.detail.path);
            applyNavLinks();
        });
    })();

    document.body.addEventListener("htmx:responseError", function(e) {
        var d = document.getElementById("error-display");
        d.textContent = "Error " + e.detail.xhr.status + ": Request failed.";
        setTimeout(function() { d.textContent = ""; }, 5000);
    });
    document.body.addEventListener("htmx:sendError", function() {
        document.getElementById("error-display").textContent =
            "Cannot reach server.";
    });
    </script>
</body>
</html>
