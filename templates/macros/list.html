{% extends "base.html" %}

{% block title %}Macros — x4explorer{% endblock %}

{% block content %}
<h1>Macros</h1>

<div class="search-controls">
    <div class="search-row">
        <input type="search" name="q" value="{{ query }}" placeholder="Filter by name..."
               hx-get="/macros"
               hx-trigger="input changed delay:300ms, keyup[key=='Enter']"
               hx-target="#macros-data"
               hx-include="[name='class'],[name='sort'],[name='dir'],[name='per_page']"
               hx-vals='{"page": "1"}'
               hx-push-url="true"
               hx-sync="this:replace"
               autocomplete="off">
        <select name="per_page"
                hx-get="/macros"
                hx-target="#macros-data"
                hx-include="[name='class'],[name='q'],[name='sort'],[name='dir']"
                hx-vals='{"page": "1"}'
                hx-push-url="true">
            {% for size in [10, 25, 50, 100] %}
            <option value="{{ size }}" {{ 'selected' if page.per_page == size }}>{{ size }}</option>
            {% endfor %}
        </select>
        <a href="/macros" class="btn-reset" role="button"
           onclick="sessionStorage.removeItem('x4e_nav_/macros')">Reset</a>
    </div>
    <div class="filter-selects">
        <select name="class"
                hx-get="/macros"
                hx-target="#macros-data"
                hx-include="[name='q'],[name='sort'],[name='dir'],[name='per_page']"
                hx-vals='{"page": "1"}'
                hx-push-url="true">
            <option value="">All classes</option>
            {% for c in filters.classes %}
            <option value="{{ c }}" {{ 'selected' if c == macro_class }}>{{ c }}</option>
            {% endfor %}
        </select>
    </div>
</div>

<div id="macros-data" hx-sync="this:replace">
    {% include "macros/_table.html" %}
</div>
{% endblock %}
