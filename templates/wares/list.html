{% extends "base.html" %}

{% block title %}Wares — x4explorer{% endblock %}

{% block content %}
<h1>Wares</h1>

<div class="search-controls">
    <div class="search-row">
        <input type="search" name="q" value="{{ query }}" placeholder="Filter by ID..."
               hx-get="/wares"
               hx-trigger="input changed delay:300ms, keyup[key=='Enter']"
               hx-target="#wares-data"
               hx-include="[name='group'],[name='transport'],[name='tag'],[name='sort'],[name='dir'],[name='per_page']"
               hx-vals='{"page": "1"}'
               hx-push-url="true"
               hx-sync="this:replace"
               autocomplete="off">
        <select name="per_page"
                hx-get="/wares"
                hx-target="#wares-data"
                hx-include="[name='group'],[name='transport'],[name='tag'],[name='q'],[name='sort'],[name='dir']"
                hx-vals='{"page": "1"}'
                hx-push-url="true">
            {% for size in [10, 25, 50, 100] %}
            <option value="{{ size }}" {{ 'selected' if page.per_page == size }}>{{ size }}</option>
            {% endfor %}
        </select>
        <a href="/wares" class="btn-reset" role="button"
           onclick="sessionStorage.removeItem('x4e_nav_/wares')">Reset</a>
    </div>
    <div class="filter-selects">
        <select name="group"
                hx-get="/wares"
                hx-target="#wares-data"
                hx-include="[name='transport'],[name='tag'],[name='q'],[name='sort'],[name='dir'],[name='per_page']"
                hx-vals='{"page": "1"}'
                hx-push-url="true">
            <option value="">All groups</option>
            {% for g in filters.groups %}
            <option value="{{ g }}" {{ 'selected' if g == group }}>{{ g }}</option>
            {% endfor %}
        </select>
        <select name="transport"
                hx-get="/wares"
                hx-target="#wares-data"
                hx-include="[name='group'],[name='tag'],[name='q'],[name='sort'],[name='dir'],[name='per_page']"
                hx-vals='{"page": "1"}'
                hx-push-url="true">
            <option value="">All transport</option>
            {% for t in filters.transports %}
            <option value="{{ t }}" {{ 'selected' if t == transport }}>{{ t }}</option>
            {% endfor %}
        </select>
        <select name="tag"
                hx-get="/wares"
                hx-target="#wares-data"
                hx-include="[name='group'],[name='transport'],[name='q'],[name='sort'],[name='dir'],[name='per_page']"
                hx-vals='{"page": "1"}'
                hx-push-url="true">
            <option value="">All tags</option>
            {% for tg in filters.tags %}
            <option value="{{ tg }}" {{ 'selected' if tg == tag }}>{{ tg }}</option>
            {% endfor %}
        </select>
    </div>
</div>

<div id="wares-data" hx-sync="this:replace">
    {% include "wares/_table.html" %}
</div>
{% endblock %}
