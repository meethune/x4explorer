{% if page.total_pages > 1 %}
<nav aria-label="Pagination">
    <ul>
        <li>
            {% if page.has_prev %}
            <a href="{{ base_url }}&page={{ page.number - 1 }}&per_page={{ page.per_page }}"
               hx-get="{{ base_url }}&page={{ page.number - 1 }}&per_page={{ page.per_page }}"
               hx-target="#search-results"
               hx-swap="innerHTML focus-scroll:false"
               hx-push-url="true">Prev</a>
            {% else %}
            <span aria-disabled="true">Prev</span>
            {% endif %}
        </li>
        <li><span>Page {{ page.number }} of {{ page.total_pages }}</span></li>
        <li>
            {% if page.has_next %}
            <a href="{{ base_url }}&page={{ page.number + 1 }}&per_page={{ page.per_page }}"
               hx-get="{{ base_url }}&page={{ page.number + 1 }}&per_page={{ page.per_page }}"
               hx-target="#search-results"
               hx-swap="innerHTML focus-scroll:false"
               hx-push-url="true">Next</a>
            {% else %}
            <span aria-disabled="true">Next</span>
            {% endif %}
        </li>
    </ul>
</nav>
{% endif %}
